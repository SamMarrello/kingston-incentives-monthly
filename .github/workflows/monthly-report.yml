name: Monthly Incentives Report

on:
  schedule:
    # Run on 1st of every month at 9:00 AM UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Report date (YYYY-MM-DD)'
        required: false
        default: ''

env:
  REPORT_DATE: ${{ github.event.inputs.report_date || '' }}

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 markdown pyyaml
      
      - name: Generate report
        run: |
          python scripts/generate_report.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Monthly incentives report - $(date +%Y-%m-%d)"
          git push
